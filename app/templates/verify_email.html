<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f6f6f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 8px; overflow: hidden; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .header h1 { color: #222; margin: 0; font-size: 24px; }
        .content { font-size: 16px; line-height: 1.6; text-align: center; }
        .btn { display: inline-block; background-color: #4CAF50; color: #ffffff; padding: 12px 24px; text-decoration: none; border-radius: 4px; font-weight: bold; margin-top: 15px; }
        .footer { margin-top: 30px; text-align: center; font-size: 12px; color: #888; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Welcome to Cinema Events</h1>
        </div>
        <div class="content">
            <p>Thanks for signing up! Please verify your email address to activate your account.</p>
            <a href="{{ frontend_url }}/verify-email?token={{ token }}" class="btn">Verify Email</a>
            <p style="font-size: 14px; color: #666; margin-top: 20px;">This link expires in 24 hours.</p>
        </div>
        <div class="footer">
            <p>If you did not create an account, you can safely ignore this email.</p>
        </div>
    </div>
</body>
</html>
